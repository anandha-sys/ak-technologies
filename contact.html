<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AK Group of Technologies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* (Same Base Styles as index.html) */
        :root {
            --bg-dark: #071324;
            --cyan-glow: #2ce5d6;
            --card-border: #185a7d;
            --text-white: #ffffff;
            --text-dark: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: var(--bg-dark); color: var(--text-white);
            background-image: radial-gradient(circle at 50% 0%, #0d2847 0%, transparent 50%);
            min-height: 100vh;
        }

        /* Header */
        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: rgba(7, 19, 36, 0.9); border-bottom: 1px solid rgba(44, 229, 214, 0.2); flex-wrap: wrap;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-ak {
            font-size: 2.5rem; font-weight: 800; color: transparent;
            background: linear-gradient(90deg, #4b7bec, var(--cyan-glow));
            -webkit-background-clip: text; background-clip: text;
        }
        .logo-text h1 { font-size: 1.2rem; letter-spacing: 2px; }
        .logo-text h2 { font-size: 0.9rem; font-weight: 300; letter-spacing: 3px; }
        nav ul { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        nav a { color: var(--text-white); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.3s ease; }
        nav a:hover { color: var(--cyan-glow); }

        /* Contact Form Styles */
        .page-section { padding: 60px 5%; max-width: 600px; margin: 0 auto; text-align: center; }
        .section-title { font-size: 2.5rem; margin-bottom: 30px; color: var(--cyan-glow); }
        .section-title span { color: var(--text-white); }
        
        form { display: flex; flex-direction: column; gap: 20px; }
        input, textarea {
            width: 100%; padding: 15px; border-radius: 5px;
            background: rgba(255, 255, 255, 0.05); color: #fff;
            border: 1px solid var(--card-border); font-size: 1rem;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--cyan-glow); }
        button {
            padding: 15px; font-size: 1.1rem; font-weight: bold;
            background: linear-gradient(90deg, #0d4057, var(--card-border));
            color: #fff; border: 1px solid var(--cyan-glow); border-radius: 5px;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--cyan-glow); color: var(--text-dark); }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            nav ul { justify-content: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-ak">AK</span>
            <div class="logo-text">
                <h1>AK GROUP OF</h1>
                <h2>TECHNOLOGIES</h2>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT US</a></li>
                <li><a href="services.html">SERVICES</a></li>
                <li><a href="projects.html">PROJECTS</a></li>
                <li><a href="careers.html">CAREERS</a></li>
                <li><a href="contact.html" style="color: var(--cyan-glow);">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="page-section">
        <h2 class="section-title">GET IN <span>TOUCH</span></h2>
        <form action="#" method="POST">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email Address" required>
            <textarea rows="5" placeholder="How can we help you?" required></textarea>
            <button type="submit">SEND MESSAGE</button>
        </form>
    </main>

</body>
</html>
