<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AK Group of Technologies</title>
    <!-- FontAwesome for the WhatsApp and Email icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #071324; --cyan-glow: #2ce5d6; --card-border: #185a7d;
            --text-white: #ffffff; --text-dark: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: var(--bg-dark); color: var(--text-white);
            background-image: radial-gradient(circle at 50% 0%, #0d2847 0%, transparent 50%);
            min-height: 100vh;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: rgba(7, 19, 36, 0.9); border-bottom: 1px solid rgba(44, 229, 214, 0.2); flex-wrap: wrap;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-ak {
            font-size: 2.5rem; font-weight: 800; color: transparent;
            background: linear-gradient(90deg, #4b7bec, var(--cyan-glow));
            -webkit-background-clip: text; background-clip: text;
        }
        .logo-text h1 { font-size: 1.2rem; letter-spacing: 2px; }
        .logo-text h2 { font-size: 0.9rem; font-weight: 300; letter-spacing: 3px; }
        nav ul { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        nav a { color: var(--text-white); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.3s ease; }
        nav a:hover { color: var(--cyan-glow); }

        /* Contact Page Styles */
        .page-section { padding: 60px 5%; max-width: 800px; margin: 0 auto; text-align: center; }
        .section-title { font-size: 2.5rem; margin-bottom: 30px; color: var(--cyan-glow); }
        .section-title span { color: var(--text-white); }
        
        .content-box {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border);
            padding: 50px 30px; border-radius: 8px;
            box-shadow: 0 0 20px rgba(44, 229, 214, 0.1);
        }

        .contact-methods {
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 20px;
        }

        .contact-card {
            flex: 1; min-width: 250px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--card-border);
            padding: 40px 20px; border-radius: 8px; text-decoration: none; color: var(--text-white);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .contact-card i { font-size: 3.5rem; }
        .contact-card.whatsapp i { color: #25D366; } /* Official WhatsApp Green */
        .contact-card.email i { color: var(--cyan-glow); }
        
        .contact-card h3 { font-size: 1.5rem; letter-spacing: 1px; }
        .contact-card p { color: #ccc; font-size: 0.95rem; }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(44, 229, 214, 0.3);
            border-color: var(--cyan-glow);
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            nav ul { justify-content: center; gap: 15px; }
            .contact-methods { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-ak">AK</span>
            <div class="logo-text"><h1>AK GROUP OF</h1><h2>TECHNOLOGIES</h2></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT US</a></li>
                <li><a href="services.html">SERVICES</a></li>
                <li><a href="projects.html">PROJECTS</a></li>
                <li><a href="careers.html">CAREERS</a></li>
                <li><a href="contact.html" style="color: var(--cyan-glow);">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-section">
        <h2 class="section-title">GET IN <span>TOUCH</span></h2>
        
        <div class="content-box">
            <p style="font-size: 1.2rem; margin-bottom: 30px;">Choose your preferred method to reach out to our team directly.</p>

            <div class="contact-methods">
                
                <!-- WHATSAPP BUTTON -->
                <a href="https://wa.me/918590294115" target="_blank" class="contact-card whatsapp">
                    <i class="fa-brands fa-whatsapp"></i>
                    <h3>WhatsApp</h3>
                    <p>Message AK STUDIO</p>
                </a>

                <!-- EMAIL BUTTON -->
                <a href="mailto:krishnanhanandha45@gmail.com" class="contact-card email">
                    <i class="fa-solid fa-envelope"></i>
                    <h3>Email</h3>
                    <p>krishnanhanandha45@gmail.com</p>
                </a>

            </div>
        </div>
    </main>
</body>
</html>
