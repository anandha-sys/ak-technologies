<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Group of Technologies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo">AK<span>GROUP</span></div>
        <ul class="nav-links">
            <li><a href="#">Innovations</a></li>
            <li><a href="#">AI Systems</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="text-content">
            <div class="badge">Next-Gen Tech</div>
            <h1>Engineering the<br><span class="gradient-text">Future.</span></h1>
            <p>AK Group of Technologies pioneers immersive, 3D, and AI-driven digital ecosystems for the modern world.</p>
            <button class="glass-btn">Initialize Sequence</button>
        </div>
        
        <div class="scene">
            <div class="glass-card tilt-element">
                <div class="card-inner">
                    <div class="card-icon"></div>
                    <h3>Core Engine</h3>
                    <div class="divider"></div>
                    <p>System status: Optimal.<br>Hover to interact with the 3D matrix.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
